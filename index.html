<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gangetabellerne - Sjov med tal!</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <h1 class="app-title">Gangetabellerne</h1>
    <div class="counters-group">
      <div class="star-counter" id="star-counter">
        <span class="star-icon">&#11088;</span>
        <span class="star-count" id="star-count">0</span>
      </div>
      <div class="star-counter mistake-counter" id="mistake-counter">
        <span class="star-icon mistake-star-icon">&#11088;</span>
        <span class="star-count" id="mistake-count">0</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main id="main-content" class="main-content">
    <!-- Dynamic content rendered here by app.js -->
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    <p id="footer-message">Du er fantastisk! Bliv ved med at lære!</p>
  </footer>

  <!-- Confetti container -->
  <div id="confetti-container" class="confetti-container"></div>

  <!-- Scripts: app.js first, then game modes -->
  <script src="js/app.js"></script>
  <script src="js/fill-blank.js"></script>
  <script src="js/multiple-choice.js"></script>
  <script src="js/missing-factor.js"></script>
  <script src="js/speed-challenge.js"></script>
  <script src="js/memory-game.js"></script>
  <script src="js/table-sequence.js"></script>
  <script src="js/long-division.js"></script>

</body>
</html>
